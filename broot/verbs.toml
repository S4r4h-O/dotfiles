# This config tries to preserve the muscle memory from nvim

[[verbs]]
invocation = "edit"
shortcut = "e"
keys = ["enter", "ctrl-e"]
apply_to = "text_file"
external = 'nvim +{line} {file}'
leave_broot = false

# Navigation

[[verbs]]
invocation = "create {subpath}"
external = "nvim {directory}/{subpath}"
leave_broot = false

[[verbs]]
key = "j"
internal = ":line_down"

[[verbs]]
key = "k"
internal = ":line_up"

[[verbs]]
key = "ctrl-d"
internal = ":page_down"

[[verbs]]
key = "ctrl-u"
internal = ":page_up"

[[verbs]]
key = "g"
internal = ":select_first"

[[verbs]]
key = "G"
internal = ":select_last"

[[verbs]]
key = "H"
internal = ":back"

[[verbs]]
key = "L"
internal = ":open_stay"

[[verbs]]
key = "["
internal = ":previous_dir"

[[verbs]]
key = "]"
internal = ":next_dir"

[[verbs]]
key = "tab"
internal = ":next_match"

[[verbs]]
key = "N"
internal = ":previous_match"

[[verbs]]
key = "{"
internal = ":previous_same_depth"

[[verbs]]
key = "}"
internal = ":next_same_depth"

# File operations

[[verbs]]
key = "o"
internal = ":open_stay"

[[verbs]]
key = "O"
internal = ":open_leave"

[[verbs]]
invocation = "yank"
shortcut = "y"
key = "y"
internal = ":copy_path"

[[verbs]]
invocation = "trash"
key = "d"
internal = ":trash"
auto_exec = false
leave_broot = false

[[verbs]]
key = "ctrl-s"
internal = ":toggle_stage"

[[verbs]]
key = "+"
internal = ":stage"

[[verbs]]
key = "-"
internal = ":unstage"

[[verbs]]
name = "touch"
key = "ctrl-t"
invocation = "touch {new_file}"
execution = "touch {directory}/{new_file}"
leave_broot = false
auto_exec = false

# Toggles

[[verbs]]
key = "p"
internal = ":toggle_preview"

[[verbs]]
key = "I"
internal = ":toggle_hidden"

[[verbs]]
key = "S"
internal = ":toggle_sizes"

[[verbs]]
key = "."
internal = ":toggle_git_status"

[[verbs]]
key = "alt-g"
internal = ":toggle_git_status"

[[verbs]]
key = "ctrl-w"
internal = ":close_panel_cancel"

[[verbs]]
key = "ctrl-l"
internal = ":focus_panel_right"

[[verbs]]
key = "ctrl-h"
internal = ":focus_panel_left"

[[verbs]]
key = "q"
internal = ":quit"
