font pango:MesloLGS Nerd Font Mono Bold 14

# Catppuccin Mocha palette
set $rosewater #f5e0dc
set $flamingo  #f2cdcd
set $pink      #f5c2e7
set $mauve     #cba6f7
set $red       #f38ba8
set $maroon    #eba0ac
set $peach     #fab387
set $yellow    #f9e2af
set $green     #a6e3a1
set $teal      #94e2d5
set $sky       #89dceb
set $sapphire  #74c7ec
set $blue      #89b4fa
set $lavender  #b4befe
set $text      #cdd6f4
set $subtext1  #bac2de
set $subtext0  #a6adc8
set $overlay2  #9399b2
set $overlay1  #7f849c
set $overlay0  #6c7086
set $surface2  #585b70
set $surface1  #45475a
set $surface0  #313244
set $base      #1e1e2e
set $mantle    #181825
set $crust     #11111b

# target                 title     bg       text    indicator   border
client.focused           $mantle   $mauve   $mantle $rosewater  $mauve
client.focused_inactive  $overlay0 $base    $text   $rosewater  $overlay0
client.unfocused         $overlay0 $base    $text   $rosewater  $overlay0
client.urgent            $peach    $base    $peach  $overlay0   $peach
client.placeholder       $overlay0 $base    $text   $overlay0   $overlay0
client.background        $base

bar {
    status_command i3status
    position top

    colors {
        background #1e1e2e
        statusline #cdd6f4
        separator  #6c7086

        focused_workspace  #89b4fa #89b4fa #1e1e2e
        active_workspace   #313244 #313244 #cdd6f4
        inactive_workspace #1e1e2e #1e1e2e #6c7086
        urgent_workspace   #f38ba8 #f38ba8 #1e1e2e
    }
}
